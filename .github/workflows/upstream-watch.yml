# Weekly: check vendored plugins' upstreams; open auto-update PRs (issue fallback) and refresh catalog star counts.
name: upstream-watch

on:
  schedule:
    - cron: '17 6 * * 1'   # Mondays 06:17 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Check upstreams and open update PRs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "marketplace-bot"
          git config user.email "noreply@users.noreply.github.com"
          python3 scripts/upstream_watch.py --create-prs

      - name: Refresh catalog star counts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/build_catalog.py
          if ! git diff --quiet CATALOG.md; then
            git add CATALOG.md
            git commit -m "chore: refresh catalog star counts [skip ci]"
            git push
          fi
