# PR gate: manifests, versioning, secrets, risk lint, smoke test, config drift, Claude security review.
name: pr-validation

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate-manifests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: python3 scripts/validate.py

  enforce-versioning:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - run: python3 scripts/check_versions.py "origin/${{ github.base_ref }}"

  secrets-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read  # gitleaks-action lists PR commits — required on private instance repos
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  risk-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: python3 scripts/risk_lint.py
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: risk-report
          path: risk-report.json

  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: python3 scripts/smoke_test.py

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
      - name: Run shellcheck on all .sh files
        run: find . -path ./.git -prune -o -name '*.sh' -print0 | xargs -0 shellcheck -S error

  # Rendered files must match marketplace.config.yml: render twice, demand a clean tree.
  # Catches hand-edits to generated values and non-idempotent renderer bugs in one shot.
  config-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Check markers + render twice + demand clean tree
        run: |
          python3 scripts/apply_config.py --check
          python3 scripts/apply_config.py
          python3 scripts/apply_config.py
          if ! git diff --exit-code; then
            echo "::error::[CFG-005] rendered files drifted from marketplace.config.yml — run 'python3 scripts/apply_config.py' locally, commit the result, and edit the config (not the rendered value) next time. See docs/TROUBLESHOOTING.md#cfg-005"
            exit 14
          fi

  # Extracts what each changed plugin can touch (MCP servers, tools, hooks, shell, endpoints)
  # and posts it as a sticky PR comment so reviewers see the blast radius at a glance.
  permission-manifest:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Generate manifest for changed plugins
        id: gen
        run: |
          changed=$(git diff --name-only "origin/${{ github.base_ref }}"...HEAD | awk -F/ '/^plugins\//{print $1"/"$2}' | sort -u)
          if [ -z "$changed" ]; then
            echo "no plugin changes — skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          python3 scripts/permission_manifest.py --markdown $changed > manifest.md
      - name: Post sticky PR comment
        if: steps.gen.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          marker="<!-- permission-manifest -->"
          { echo "$marker"; echo; cat manifest.md; } > comment.md
          cid=$(gh api "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
                --jq ".[] | select(.body | startswith(\"$marker\")) | .id" | head -1)
          if [ -n "$cid" ]; then
            gh api "repos/${{ github.repository }}/issues/comments/$cid" -X PATCH -F body=@comment.md
          else
            gh api "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" -F body=@comment.md
          fi

  # Claude reviews the PR diff for prompt injection, exfiltration, hidden instructions.
  # Gated on modules.llm_review config flag. Without the ANTHROPIC_API_KEY secret the job
  # passes with a visible "SKIPPED" notice so reviewers see the gap.
  llm-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Check if LLM review is enabled
        id: cfg
        run: echo "enabled=$(python3 scripts/config_loader.py marketplace.config.yml modules.llm_review true)" >> "$GITHUB_OUTPUT"
      - if: steps.cfg.outputs.enabled == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 scripts/llm_review.py --diff "origin/${{ github.base_ref }}"
      - if: steps.cfg.outputs.enabled != 'true'
        run: |
          echo "llm-review disabled via modules.llm_review — skipping"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: llm-review-report
          path: llm-review.json
          if-no-files-found: ignore
