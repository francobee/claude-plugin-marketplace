# Publish the catalog site to Cloudflare Pages (free plan, works for private repos).
# Runs only when marketplace.config.yml says `site.hosting: cloudflare`.
# Two supported modes (docs/HOSTING.md):
#   - Dashboard-connected: you linked the repo inside the Cloudflare dashboard — Cloudflare
#     deploys on its own and this workflow just reports that and exits green.
#   - CI deploy: set the CLOUDFLARE_API_TOKEN secret + CLOUDFLARE_ACCOUNT_ID variable and
#     this workflow pushes site/ with wrangler on every merge.
name: site-cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: site-cloudflare
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Read hosting choice from marketplace.config.yml
        id: cfg
        run: |
          {
            echo "hosting=$(python3 scripts/config_loader.py marketplace.config.yml site.hosting github-pages)"
            echo "project=$(python3 scripts/config_loader.py marketplace.config.yml site.cloudflare_project "$(python3 scripts/config_loader.py marketplace.config.yml company.marketplace_name internal)")"
          } >> "$GITHUB_OUTPUT"

      - name: Not on Cloudflare — nothing to do
        if: steps.cfg.outputs.hosting != 'cloudflare'
        run: echo "site.hosting is '${{ steps.cfg.outputs.hosting }}' — this workflow only acts on 'cloudflare'."

      - name: Build site
        if: steps.cfg.outputs.hosting == 'cloudflare'
        run: python3 scripts/build_site.py

      - name: Deploy site/ with wrangler
        if: steps.cfg.outputs.hosting == 'cloudflare'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          PROJECT: ${{ steps.cfg.outputs.project }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "No CLOUDFLARE_API_TOKEN secret / CLOUDFLARE_ACCOUNT_ID variable set."
            echo "If you connected this repo in the Cloudflare dashboard, deploys already happen there — nothing to do."
            echo "For CI deploys instead, see docs/HOSTING.md."
            exit 0
          fi
          # Idempotent: create the project if it doesn't exist yet, then deploy.
          npx --yes wrangler@4 pages project create "$PROJECT" --production-branch=main 2>/dev/null \
            || echo "project '$PROJECT' already exists — continuing"
          npx --yes wrangler@4 pages deploy site --project-name="$PROJECT" --branch=main
          echo "deployed → https://${PROJECT}.pages.dev"

      # Zero-config alerting: a failed Cloudflare deploy files/updates a deduped GitHub issue.
      - name: Notify admins on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/notify.py --code CI-003 --context "site-cloudflare run failed on $GITHUB_SHA"
