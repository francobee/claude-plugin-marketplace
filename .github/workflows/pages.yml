# Publish the catalog site to GitHub Pages on every push to main.
# Runs only when marketplace.config.yml says `site.hosting: github-pages` —
# instances on Cloudflare (or with the site disabled) skip cleanly instead of failing.
name: pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  route:
    runs-on: ubuntu-latest
    outputs:
      hosting: ${{ steps.cfg.outputs.hosting }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - id: cfg
        run: echo "hosting=$(python3 scripts/config_loader.py marketplace.config.yml site.hosting github-pages)" >> "$GITHUB_OUTPUT"

  deploy:
    needs: route
    if: needs.route.outputs.hosting == 'github-pages'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Build site
        run: python3 scripts/build_site.py
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site/
      # GitHub's Pages backend intermittently returns "Deployment failed, try again later" — so try again.
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
        continue-on-error: true
      - name: Retry deploy after transient failure
        if: steps.deployment.outcome == 'failure'
        run: sleep 45
      - id: deployment-retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
      - name: Notify admins on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/notify.py --code CI-002 --context "pages deploy failed on $GITHUB_SHA"
